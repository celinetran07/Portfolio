<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="assets/logo_flower.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Creative — Celine Tran</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="page-wrap">
    <div id="page-decos-placeholder"></div>
    <div id="cursor"></div>
    <div id="nav-placeholder"></div>

    <div style="padding-top:4em;">

      <div class="creative-header has-petals">
        <p class="section-eyebrow">Explorations</p>
        <h1 class="section-title">Creative</h1>
        <p>Personal projects, experiments, and explorations.</p>
      </div>

      <div class="creative-grid-staggered">

        <div class="creative-col-left">
          <a href="nail-art.html" class="card fade-up">
            <div class="card-thumb v1">
              <img src="assets/nails/nail_cover.jpg" alt="Nail Art"
                style="width:100%;height:100%;object-fit:cover;object-position:bottom;">
              <div class="card-thumb-overlay"></div>
            </div>
            <div class="card-body">
              <p class="card-tag">Nail Art — 2020–Present</p>
              <h2 class="card-title">Nail Designs</h2>
            </div>
          </a>

          <a href="audio-project.html" class="card fade-up">
            <div class="card-thumb v3">
              <img src="assets/audio_project/audio_cover.png" alt="Audio"
                style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
              <div class="card-thumb-overlay"></div>
            </div>
            <div class="card-body">
              <p class="card-tag">Audio — 2024</p>
              <h2 class="card-title">Bathroom Montage</h2>
            </div>
          </a>
        </div>

        <div class="creative-col-right">
          <a href="video-project.html" class="card fade-up">
            <div class="card-thumb v2">
              <img src="assets/video_project/video-cover.png" alt="Video"
                style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
              <div class="card-thumb-overlay"></div>
            </div>
            <div class="card-body">
              <p class="card-tag">Video — 2024</p>
              <h2 class="card-title">Is a Body a City?</h2>
            </div>
          </a>

          <a href="woodwork.html" class="card fade-up">
            <div class="card-thumb v4">
              <img src="assets/woodwork/wood-3.jpg" alt="Woodwork"
                style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
              <div class="card-thumb-overlay"></div>
            </div>
            <div class="card-body">
              <p class="card-tag">Woodwork — May 2022</p>
              <h2 class="card-title">Oak Shelf</h2>
            </div>
          </a>
        </div>

      </div>

    </div>

    <div id="contact-divider-placeholder"></div>
    <div id="contact-placeholder"></div>

  </div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/contact.js"></script>
</body>

</html>
